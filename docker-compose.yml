services:
  postgres:
    image: postgres:17-alpine
    container_name: rental-manager-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rental_manager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rental_manager_password}
      POSTGRES_DB: ${POSTGRES_DB:-rental_manager}
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/postgres/config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-rental_manager} -d ${POSTGRES_DB:-rental_manager}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mailpit:
    image: axllent/mailpit:latest
    container_name: rental-manager-mailpit
    restart: unless-stopped
    ports:
      - '${MAIL_PORT:-1025}:1025'
      - '8025:8025'

volumes:
  postgres-data:
