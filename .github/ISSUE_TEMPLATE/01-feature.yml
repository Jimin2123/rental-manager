name: 기능 (Feature)
description: 하위 호환되는 새 기능을 기획합니다
title: 'feat: '
labels: ['type: feature', 'flow: feature']
body:
  - type: markdown
    attributes:
      value: |
        새 기능 작업용 템플릿입니다.
        `develop`에서 `feature/<scope>/<description>` 브랜치를 생성해 진행하세요.

  - type: input
    id: summary
    attributes:
      label: 요약
      description: 기능을 한 문장으로 설명하세요.
      placeholder: '렌탈 상품 생성 API 추가'
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 배경 / 목적
      description: 이 기능이 해결하는 문제를 설명하세요.
      placeholder: |
        관리자가 DB를 직접 수정하지 않고 렌탈 상품을 생성할 수 있어야 합니다.
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: 요구사항
      description: 필요한 동작을 체크리스트로 작성하세요.
      value: |
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 기준 (Acceptance Criteria)
      value: |
        - [ ] 정상 흐름이 동작한다
        - [ ] 예외 케이스가 처리된다
        - [ ] 테스트 또는 문서화된 수동 검증이 포함된다
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 영향 영역 (Area)
      options:
        - web
        - api
        - full-stack
        - tooling
        - docs
    validations:
      required: true

  - type: textarea
    id: api_db_changes
    attributes:
      label: API / 데이터 변경
      description: 엔드포인트, DTO, 모델/스키마, 마이그레이션 변경을 적으세요.
      placeholder: |
        API:
        - POST /rental-products

        데이터:
        - prisma/models/product/rental-product.prisma (신규 모델)
        - 마이그레이션 1건

  - type: textarea
    id: validation
    attributes:
      label: 검증 계획
      description: '`apps/api` 또는 `apps/web` 디렉터리에서 실행합니다.'
      value: |
        - [ ] pnpm lint
        - [ ] pnpm build
        - [ ] pnpm test
        - [ ] 수동 UI/API 확인

  - type: dropdown
    id: semver
    attributes:
      label: SemVer 영향
      options:
        - 'MINOR — 하위 호환 새 기능'
        - 'MAJOR — 하위 호환 불가 변경'
        - 'PATCH — 내부 변경만'
        - '미정'
    validations:
      required: true
