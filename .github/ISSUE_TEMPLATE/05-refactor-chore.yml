name: Refactor / Chore
description: Track maintenance, refactoring, docs, build, or tooling work
title: 'chore: '
labels: ['type: chore', 'flow: develop']
body:
  - type: markdown
    attributes:
      value: |
        Use this for non-feature maintenance. If user-facing behavior changes, use Feature or Bugfix instead.

  - type: dropdown
    id: work_type
    attributes:
      label: Work Type
      options:
        - Refactor
        - Chore
        - Docs
        - Test
        - Build
        - CI/CD
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: Work Summary
      placeholder: 'Unify ESLint and Prettier settings'
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason
      placeholder: 'Explain why this maintenance work is needed.'
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: risk
    attributes:
      label: Impact / Risk
      placeholder: 'No behavior change expected. Build or CI settings may be affected.'

  - type: textarea
    id: validation
    attributes:
      label: Validation
      value: |
        - [ ] npm run lint
        - [ ] npm run build
        - [ ] npm run test -w api
        - [ ] Existing behavior is unchanged

  - type: dropdown
    id: semver
    attributes:
      label: SemVer Impact
      options:
        - PATCH - maintenance/internal cleanup
        - No release impact
        - Unknown
    validations:
      required: true

  - type: checkboxes
    id: git_flow
    attributes:
      label: Git Flow Checklist
      options:
        - label: 'Branch from `develop`.'
          required: true
        - label: 'Use a short branch name such as `chore/<issue-number>-<slug>` or `refactor/<issue-number>-<slug>`.'
          required: true
        - label: 'Convert to Feature or Bugfix if behavior changes.'
          required: true
