# PostgreSQL runtime configuration for local Docker environments.
# Keep durable defaults enabled; tune host-specific capacity outside this file.

listen_addresses = '*'
port = 5432
max_connections = 100

# Baseline memory settings for a small service container.
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 4MB
maintenance_work_mem = 64MB

# WAL and checkpoint settings favor steady write behavior over bursty fsyncs.
checkpoint_completion_target = 0.9
wal_buffers = 16MB
min_wal_size = 1GB
max_wal_size = 4GB

# Planner defaults for SSD-backed Docker hosts.
default_statistics_target = 100
random_page_cost = 1.1
effective_io_concurrency = 200

# Locale and time handling.
timezone = 'Asia/Seoul'
log_timezone = 'Asia/Seoul'
datestyle = 'iso, ymd'

# Authentication and safety.
password_encryption = scram-sha-256
idle_in_transaction_session_timeout = '5min'
lock_timeout = '10s'

# Operational logging.
logging_collector = off
log_destination = 'stderr'
log_min_duration_statement = 500
log_statement = 'ddl'
log_connections = on
log_disconnections = on
log_lock_waits = on
deadlock_timeout = '1s'
