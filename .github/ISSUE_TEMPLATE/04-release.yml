name: Release
description: Prepare and verify a release
title: 'release: '
labels: ['type: release', 'flow: release']
body:
  - type: markdown
    attributes:
      value: |
        Use this to prepare a SemVer release. Start from `develop` with `git flow release start <version>`.

  - type: input
    id: version
    attributes:
      label: Release Version
      placeholder: '0.2.0'
    validations:
      required: true

  - type: textarea
    id: release_scope
    attributes:
      label: Release Scope
      description: Summarize the issues and changes included in this release.
      value: |
        ## Features
        -

        ## Bugfixes
        -

        ## Chores
        -
    validations:
      required: true

  - type: dropdown
    id: semver
    attributes:
      label: SemVer Bump
      options:
        - MAJOR - breaking changes
        - MINOR - backward-compatible features
        - PATCH - backward-compatible fixes or maintenance
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Release Checklist
      value: |
        - [ ] `develop` is up to date.
        - [ ] `git flow release start <version>` was used.
        - [ ] Root `package.json`, workspace `package.json` files, and `package-lock.json` are versioned.
        - [ ] npm run lint
        - [ ] npm run build
        - [ ] npm run test -w api
        - [ ] npm run test:e2e -w api
        - [ ] Release notes are ready.
        - [ ] Release is finished into `main` and back-merged into `develop`.
    validations:
      required: true

  - type: textarea
    id: qa_result
    attributes:
      label: QA Result
      placeholder: |
        Issues found:
        - #

        Status:
        - [ ] Complete
        - [ ] Deferred

  - type: textarea
    id: deployment_note
    attributes:
      label: Deployment Notes
      placeholder: 'Migration, environment variable, rollback, or operator notes.'

  - type: checkboxes
    id: git_flow
    attributes:
      label: Git Flow Checklist
      options:
        - label: 'Branch from `develop`.'
          required: true
        - label: 'Use `git flow release start <version>`.'
          required: true
        - label: 'Finish with `git flow release finish <version>`.'
          required: true
        - label: 'Push `main`, `develop`, and tags after release finish.'
          required: true
