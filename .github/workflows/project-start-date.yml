name: 보드 Start date 자동 기록

# 이슈가 생성되면 프로젝트 보드(Rental-Manager #18)에 추가하고
# Start date 필드를 이슈 생성일로 채운다.
# 사용자 소유 프로젝트라 기본 GITHUB_TOKEN으로는 접근 불가 → PROJECTS_TOKEN(PAT) 사용.
# gh project 명령은 owner 종류 해석에서 'unknown owner type'으로 실패하므로
# 프로젝트 node ID를 직접 쓰는 GraphQL 호출로 처리한다(추가 스코프 불필요).

on:
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  set-start-date:
    runs-on: ubuntu-latest
    steps:
      - name: Start date 기록
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          PROJECT_ID: PVT_kwHOBUGnqM4BbeyF
          START_FIELD_ID: PVTF_lAHOBUGnqM4BbeyFzhWPAwY
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          ISSUE_CREATED: ${{ github.event.issue.created_at }}
        run: |
          set -euo pipefail
          DATE="${ISSUE_CREATED%%T*}"
          # 보드에 항목 추가(이미 있으면 기존 항목 id 반환)
          ITEM_ID=$(gh api graphql -f query='
            mutation($p:ID!, $c:ID!) {
              addProjectV2ItemById(input: { projectId: $p, contentId: $c }) { item { id } }
            }' -f p="$PROJECT_ID" -f c="$ISSUE_NODE_ID" --jq '.data.addProjectV2ItemById.item.id')
          # Start date 필드 기록
          gh api graphql -f query='
            mutation($p:ID!, $i:ID!, $f:ID!, $d:Date!) {
              updateProjectV2ItemFieldValue(input: { projectId: $p, itemId: $i, fieldId: $f, value: { date: $d } }) {
                projectV2Item { id }
              }
            }' -f p="$PROJECT_ID" -f i="$ITEM_ID" -f f="$START_FIELD_ID" -f d="$DATE"
          echo "이슈 Start date=$DATE 기록 완료 (item=$ITEM_ID)"
