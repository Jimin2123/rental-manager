name: Hotfix
description: Fix a production issue from main
title: 'hotfix: '
labels: ['type: hotfix', 'flow: hotfix', 'priority: critical']
body:
  - type: markdown
    attributes:
      value: |
        Use this only for production incidents or urgent production fixes. Start from `main` with `git flow hotfix start <patch-version>`.

  - type: input
    id: summary
    attributes:
      label: Hotfix Summary
      placeholder: 'Login API returns 500 in production'
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Production Impact
      placeholder: |
        - Admins cannot log in.
        - No known data corruption.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Incident Severity
      options:
        - Critical - service unavailable
        - High - core workflow broken
        - Medium - partial workflow broken
        - Low - urgent but limited impact
    validations:
      required: true

  - type: textarea
    id: cause
    attributes:
      label: Cause
      placeholder: 'Write "Needs investigation" if unknown.'
    validations:
      required: true

  - type: textarea
    id: fix_plan
    attributes:
      label: Fix Plan
      value: |
        - [ ] Identify root cause.
        - [ ] Make the smallest safe fix.
        - [ ] Verify production impact.
        - [ ] Merge to `main`.
        - [ ] Back-merge to `develop`.
        - [ ] Confirm after deployment.

  - type: textarea
    id: rollback
    attributes:
      label: Rollback Plan
      placeholder: 'Rollback to the previous release tag if verification fails.'
    validations:
      required: true

  - type: input
    id: patch_version
    attributes:
      label: Patch Version
      placeholder: '0.1.1'
    validations:
      required: true

  - type: checkboxes
    id: git_flow
    attributes:
      label: Git Flow Checklist
      options:
        - label: 'Branch from `main`.'
          required: true
        - label: 'Use `git flow hotfix start <patch-version>`.'
          required: true
        - label: 'Update relevant `package.json` files and `package-lock.json`.'
          required: true
        - label: 'Finish into `main`, tag the patch version, and back-merge into `develop`.'
          required: true
